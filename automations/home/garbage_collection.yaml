---
alias: Garbage alert
id: "garbage_collection_alert"
mode: restart
trigger:
  - platform: event
    event_type: state_changed
condition:
  - condition: template
    value_template: "{{ trigger.event.data.new_state.attributes.is_collection_date_today | default(false) }}"
action:
  - service: telegram_bot.send_message
    data:
      message: |
        🚮 {{ trigger.event.data.new_state.attributes.friendly_name }} 🚮\n
        \n
        Today is garbage day!\n
        \n
        Upcoming garbage collections\n
        PMD\t\t\t     {{ states('sensor.afvalinfo_home_pbd') }} - {{ state_attr('sensor.afvalinfo_home_pbd', 'days_until_collection_date') }} day(s)\n
        GFT\t\t\t     {{ states('sensor.afvalinfo_home_gft') }} - {{ state_attr('sensor.afvalinfo_home_gft', 'days_until_collection_date') }} day(s)\n
        Paper\t\t     {{ states('sensor.afvalinfo_home_papier') }} - {{ state_attr('sensor.afvalinfo_home_papier', 'days_until_collection_date') }} day(s)\n
